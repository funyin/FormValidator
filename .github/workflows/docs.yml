name: Deploy Docs

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: macos-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3

      - name: Generate Dokka HTML
        run: ./gradlew :FormValidator:dokkaGeneratePublicationHtml --stacktrace

      - name: Verify docs output
        run: |
          if [ ! -d "FormValidator/build/dokka/html" ]; then
            echo "Expected FormValidator/build/dokka/html not found. Searching..."
            find FormValidator/build -name "index.html" 2>/dev/null || true
            exit 1
          fi
          echo "Docs ready at FormValidator/build/dokka/html"
          ls FormValidator/build/dokka/html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: FormValidator/build/dokka/html

      - uses: actions/deploy-pages@v4
        id: deploy
